on:

  workflow_dispatch: 

  push:
    branches:
      - main

#   pull_request:
#     types:
#       - closed
#     branches:
#       - main

jobs:
  sync-main:
    # if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - id: setup-ssh-agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GITCODE_SSH_KEY }}
      - id: add-know-hosts
        run: |
          ssh-keyscan gitcode.com >> ~/.ssh/known_hosts
      - id: fetch-gitcode
        run: |
          git config global user.name weixin_39841130
          git config global user.email weixin_39841130@noreply.gitcode.com
          git clone git@gitcode.com:flagos-ai/testsync.git
          git checkout main
          git remote add github git@github.com:flagos-ai/test-sync.git
          git fetch github
          git rebase github/main
          git push
